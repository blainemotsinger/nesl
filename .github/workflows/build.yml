name: "Build"
on: push
jobs:
  win-build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: ilammy/msvc-dev-cmd@v1
      - name: make build directory
        run: cmake -E make_directory ${{github.workspace}}/build
      - name: configure
        working-directory: ${{github.workspace}}/build
        run: cmake -G Ninja --preset release ..
      - name: build
        working-directory: ${{github.workspace}}/build/Release
        run: cmake --build .
      - name: upload
        uses: actions/upload-artifact@v6
        with:
          name: nesl-windows-x64
          path: ${{github.workspace}}/build/Release/nesl.exe

  linux-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: configure
        run: cmake -G Ninja --preset release -S . -B build/Release
      - name: build
        working-directory: ${{github.workspace}}/build/Release
        run: cmake --build .
      - name: run regression tests
        run: bash testing/run_tests.sh
      - name: upload
        uses: actions/upload-artifact@v6
        with:
          name: nesl-linux-x64
          path: ${{github.workspace}}/build/Release/nesl
